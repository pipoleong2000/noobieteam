        body { font-family: 'Inter', sans-serif; background-color: #FAFAFA; color: #262626; }

        @keyframes slideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes flyUpFade {

            10% { opacity: 1; }
            100% { transform: translateY(-500px) translateX(var(--sway)) scale(1.5); opacity: 0; }

        .animate-fade-in-up { animation: fadeInUp 0.5s cubic-bezier(0.17, 0.67, 0.83, 0.67) forwards; }

        /* AI Assistant Styles */

        .ai-minimized { width: 56px; height: 56px; border-radius: 28px; overflow: hidden; }
